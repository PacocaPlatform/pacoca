<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderação — Paçoca</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="sky" aria-hidden="true"><div class="clouds"></div><div class="stars"></div></div>

    <header class="nav">
        <a class="nav-brand" href="../">
            <span class="nav-badge">2.5D</span>
            <span class="nav-name">Paçoca</span>
        </a>
        <nav class="nav-links">
            <a href="../#comunidade">Comunidade</a>
            <a class="nav-cta" href="../editor/">Map Editor</a>
        </nav>
    </header>

    <main class="level-page" style="max-width:960px">
        <h1 class="section-title" style="text-align:left">Moderação</h1>
        <div class="mod-filters" data-mod-filters hidden>
            <label>Status:
                <select data-status class="inp">
                    <option value="all">Todas</option>
                    <option value="active">Publicadas</option>
                    <option value="hidden">Ocultas</option>
                    <option value="removed">Removidas</option>
                </select>
            </label>
        </div>
        <div data-mod-list>
            <p class="community-empty">Carregando…</p>
        </div>
    </main>

    <footer class="footer">
        <p><span class="nav-badge">2.5D</span> <strong>Paçoca</strong></p>
    </footer>

    <script src="../auth.js"></script>
    <script src="admin.js"></script>
</body>
</html>
